# render.yaml — Render.com deployment configuration (free tier)
# Docs: https://render.com/docs/blueprint-spec

services:
  # ── Streamlit UI (full app — runs pipeline directly) ─────────────────────────
  - type: web
    name: ci-market-research
    runtime: python
    region: oregon
    plan: free
    buildCommand: |
      pip install --upgrade pip
      pip install -r requirements.txt
    startCommand: streamlit run streamlit_app.py --server.port $PORT --server.address 0.0.0.0 --server.headless true
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: TAVILY_API_KEY
        sync: false
      - key: GITHUB_TOKEN
        sync: false
      - key: PYTHONDONTWRITEBYTECODE
        value: "1"
